<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常提醒器 | Smart Reminder</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0e14;
            --surf: #161b22;
            --surf-light: #21262d;
            --primary: #58a6ff;
            --secondary: #7ee787;
            --accent: #bc8cff;
            --danger: #f85149;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --white: #ffffff;
            --glass: rgba(22, 27, 34, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; height: 100vh; display: flex; justify-content: center; }

        /* Multi-page Navigation */
        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--surf);
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .view {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            background: var(--surf);
            animation: slideIn 0.3s ease-out;
            padding-bottom: 20px;
        }
        .view.active { display: flex; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Header Styles */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            z-index: 10;
            border-bottom: 1px solid var(--surf-light);
        }

        .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; color: var(--primary); font-size: 1.2rem; }
        .header-actions { display: flex; gap: 15px; }
        .icon-btn { cursor: pointer; color: var(--text-dim); transition: 0.2s; font-size: 1.2rem; }
        .icon-btn:hover { color: var(--primary); }

        /* Tabs */
        .tabs { display: flex; padding: 10px 20px; gap: 20px; }
        .tab { 
            padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.9rem;
            color: var(--text-dim); background: rgba(255,255,255,0.05); transition: 0.2s;
        }
        .tab.active { background: var(--primary); color: white; font-weight: 600; }

        /* List Items */
        .scroll-area { flex: 1; overflow-y: auto; padding: 10px 20px; }
        .reminder-card {
            background: var(--surf-light);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }
        .reminder-card:hover { transform: scale(1.02); }
        .reminder-card.pending { border-left-color: var(--primary); }
        .reminder-card.completed { border-left-color: var(--text-dim); opacity: 0.6; }

        .check-circle { 
            width: 24px; height: 24px; border: 2px solid var(--primary); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: 0.2s; color: transparent;
        }
        .completed .check-circle { background: var(--secondary); border-color: var(--secondary); color: white; }

        .item-info { flex: 1; }
        .item-title { font-weight: 600; font-size: 1.1rem; margin-bottom: 4px; color: white; }
        .item-meta { display: flex; gap: 10px; font-size: 0.8rem; color: var(--text-dim); }
        .item-meta i { margin-right: 4px; }

        /* Form Styles */
        .form-area { padding: 20px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-dim); }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%; background: var(--surf-light); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 12px; color: white; outline: none; transition: 0.2s;
        }
        .input-group input:focus { border-color: var(--primary); }

        .repeat-options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .option-chip { 
            padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; font-size: 0.8rem; background: rgba(255,255,255,0.03); transition: 0.2s;
        }
        .option-chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        .btn-full {
            width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 600;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-save { background: var(--primary); color: white; }
        .btn-save:hover { filter: brightness(1.1); box-shadow: 0 4px 15px rgba(88, 166, 255, 0.4); }

        /* Notification Popup */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .notification-modal {
            background: var(--surf-light); border-radius: 24px; width: 100%; max-width: 320px;
            padding: 24px; text-align: center; border: 1px solid var(--primary);
        }
        .bell-icon { font-size: 3rem; color: var(--primary); margin-bottom: 15px; }
        .modal-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 10px; color: white; }
        .modal-time { color: var(--text-dim); margin-bottom: 20px; font-size: 0.9rem; }
        .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-modal { padding: 10px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; }
        .btn-done { background: var(--secondary); color: white; }
        .btn-snooze { background: var(--surf); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }

        /* Settings view specific */
        .setting-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .setting-info h4 { margin-bottom: 2px; font-size: 0.95rem; }
        .setting-info p { font-size: 0.8rem; color: var(--text-dim); }

        /* Empty state */
        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-dim); }
        .empty-state i { font-size: 4rem; opacity: 0.2; margin-bottom: 15px; }

    </style>
</head>
<body>

<div class="app-container">
    
    <!-- View 1: Main (Reminder List) -->
    <div id="viewMain" class="view active">
        <header>
            <div class="brand"><i class="fas fa-bell"></i> 日常提醒器</div>
            <div class="header-actions">
                <i class="fas fa-plus icon-btn" onclick="showView('Add')"></i>
                <i class="fas fa-cog icon-btn" onclick="showView('Settings')"></i>
            </div>
        </header>

        <div class="tabs">
            <div class="tab active" data-tab="pending" onclick="setTab('pending')">待办 (0)</div>
            <div class="tab" data-tab="completed" onclick="setTab('completed')">已完成 (0)</div>
        </div>

        <div class="scroll-area" id="listArea">
            <!-- Items injected here -->
        </div>
    </div>

    <!-- View 2: Add Reminder -->
    <div id="viewAdd" class="view">
        <header>
            <i class="fas fa-chevron-left icon-btn" onclick="showView('Main')"></i>
            <div class="brand">新建提醒</div>
            <div class="icon-btn" onclick="saveReminder()" style="color:var(--primary); font-weight:600; font-size:1rem;">保存</div>
        </header>
        
        <div class="form-area">
            <div class="input-group">
                <label>标题</label>
                <input type="text" id="f_title" placeholder="要做什么？">
            </div>
            <div class="input-group">
                <label>时间</label>
                <input type="time" id="f_time">
            </div>
            <div class="input-group">
                <label>重复模式</label>
                <div class="repeat-options">
                    <div class="option-chip active" data-val="none">不重复</div>
                    <div class="option-chip" data-val="daily">每天</div>
                    <div class="option-chip" data-val="weekly:mon,tue,wed,thu,fri">工作日</div>
                    <div class="option-chip" data-val="weekly:sat,sun">周末</div>
                </div>
            </div>
            <div class="input-group">
                <label>提醒方式</label>
                <div class="repeat-options">
                    <div class="option-chip active" data-type="popup">弹窗</div>
                    <div class="option-chip active" data-type="email">邮件</div>
                    <div class="option-chip" data-type="push">Webhook</div>
                </div>
            </div>
            <div class="input-group">
                <label>备注 (可选)</label>
                <textarea id="f_notes" rows="3" placeholder="添加一些补充说明..."></textarea>
            </div>
        </div>
    </div>

    <!-- View 3: Settings -->
    <div id="viewSettings" class="view">
        <header>
            <i class="fas fa-chevron-left icon-btn" onclick="showView('Main')"></i>
            <div class="brand">设置</div>
            <div></div> <!-- Spacer -->
        </header>

        <div class="scroll-area">
            <h3 style="margin: 15px 0 10px; font-size: 0.8rem; color: var(--primary); text-transform: uppercase;">通知配置</h3>
            <div class="setting-row">
                <div class="setting-info">
                    <h4>开启邮件通知</h4>
                    <p>触发提醒时发送邮件到收件人</p>
                </div>
                <input type="checkbox" id="s_email_en" onchange="updateSettings()">
            </div>
            <div class="input-group" style="padding: 16px;">
                 <label>SMTP 服务器 / 账号</label>
                 <input type="text" id="s_smtp_svr" placeholder="smtp.gmail.com" onchange="updateSettings()">
                 <input type="text" id="s_sender" placeholder="your-email@gmail.com" style="margin-top:5px" onchange="updateSettings()">
            </div>
            
            <h3 style="margin: 25px 0 10px; font-size: 0.8rem; color: var(--primary); text-transform: uppercase;">系统</h3>
            <div class="setting-row">
                <div class="setting-info">
                    <h4>语言</h4>
                    <p>当前：简体中文</p>
                </div>
                <i class="fas fa-chevron-right icon-btn"></i>
            </div>
            <div class="setting-row">
                <div class="setting-info">
                    <h4>关于</h4>
                    <p>日常提醒器 v1.1.0</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Global Notification Modal -->
<div class="modal-overlay" id="notifyOverlay">
    <div class="notification-modal">
        <i class="fas fa-clock bell-icon"></i>
        <div class="modal-title" id="m_title">时间到啦！</div>
        <div class="modal-time" id="m_time">10:00 AM</div>
        <div class="modal-actions">
            <button class="btn-modal btn-snooze" onclick="closeModal()">推迟</button>
            <button class="btn-modal btn-done" onclick="markModalDone()">完成</button>
        </div>
    </div>
</div>

<script>
    let appData = { reminders: [], settings: {} };
    let currentTab = 'pending';

    async function init() {
        const res = await fetch('/api/data');
        appData = await res.json();
        
        // Setup initial UI states
        document.getElementById('s_email_en').checked = appData.settings.email_enabled;
        document.getElementById('s_smtp_svr').value = appData.settings.smtp_server;
        document.getElementById('s_sender').value = appData.settings.sender;
        
        renderList();
        setupFormListeners();
    }

    function showView(name) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view' + name).classList.add('active');
    }

    function setTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => {
            t.classList.toggle('active', t.dataset.tab === tab);
        });
        renderList();
    }

    function renderList() {
        const container = document.getElementById('listArea');
        const list = appData.reminders.filter(r => r.status === currentTab);
        
        document.querySelector('[data-tab="pending"]').textContent = `待办 (${appData.reminders.filter(r => r.status === 'pending').length})`;
        document.querySelector('[data-tab="completed"]').textContent = `已完成 (${appData.reminders.filter(r => r.status === 'completed').length})`;

        if (list.length === 0) {
            container.innerHTML = `<div class="empty-state">
                <i class="fas fa-clipboard-list"></i>
                <p>这里空空如也...</p>
            </div>`;
            return;
        }

        container.innerHTML = list.map(r => `
            <div class="reminder-card ${r.status}">
                <div class="check-circle" onclick="toggleStatus('${r.id}')">
                    <i class="fas fa-check"></i>
                </div>
                <div class="item-info">
                    <div class="item-title">${r.title}</div>
                    <div class="item-meta">
                        <span><i class="far fa-clock"></i> ${r.time}</span>
                        <span><i class="fas fa-redo"></i> ${formatRepeat(r.repeat)}</span>
                    </div>
                </div>
                <div class="header-actions">
                    <i class="fas fa-trash icon-btn" style="font-size:0.9rem;" onclick="deleteReminder('${r.id}')"></i>
                </div>
            </div>
        `).join('');
    }

    function formatRepeat(rep) {
        if (rep === 'none') return '不重复';
        if (rep === 'daily') return '每天';
        if (rep.includes('mon,tue,wed,thu,fri')) return '工作日';
        return '每周';
    }

    function setupFormListeners() {
        document.querySelectorAll('.option-chip[data-val]').forEach(c => {
            c.onclick = () => {
                c.parentElement.querySelectorAll('[data-val]').forEach(x => x.classList.remove('active'));
                c.classList.add('active');
            };
        });
        document.querySelectorAll('.option-chip[data-type]').forEach(c => {
            c.onclick = () => c.classList.toggle('active');
        });
    }

    async function saveReminder() {
        const title = document.getElementById('f_title').value;
        const time = document.getElementById('f_time').value;
        const repeat = document.querySelector('.option-chip[data-val].active').dataset.val;
        const notes = document.getElementById('f_notes').value;

        if (!title || !time) return alert('标题和时间是必填的哦');

        const res = await fetch('/api/reminders', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ title, time, repeat, notes })
        });
        
        if (res.ok) {
            await init();
            showView('Main');
            // Reset form
            document.getElementById('f_title').value = '';
        }
    }

    async function toggleStatus(rid) {
        const reminder = appData.reminders.find(r => r.id === rid);
        const newStatus = reminder.status === 'pending' ? 'completed' : 'pending';
        await fetch(`/api/reminders/${rid}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ status: newStatus })
        });
        init();
    }

    async function deleteReminder(rid) {
        if (!confirm('确定要删除这个提醒吗？')) return;
        await fetch(`/api/reminders/${rid}`, { method: 'DELETE' });
        init();
    }

    async function updateSettings() {
        const settings = {
            email_enabled: document.getElementById('s_email_en').checked,
            smtp_server: document.getElementById('s_smtp_svr').value,
            sender: document.getElementById('s_sender').value
        };
        await fetch('/api/settings', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(settings)
        });
    }

    // Modal Simulation for Testing UI
    function showModal(title, time) {
        document.getElementById('m_title').textContent = title;
        document.getElementById('m_time').textContent = time;
        document.getElementById('notifyOverlay').style.display = 'flex';
    }
    function closeModal() { document.getElementById('notifyOverlay').style.display = 'none'; }
    function markModalDone() { closeModal(); /* Logic for actual done */ }

    // Sync history for popups
    let lastHistoryCount = 0;
    async function checkHistoryForPopup() {
        const res = await fetch('/api/history');
        const history = await res.json();
        if (history.length > lastHistoryCount && lastHistoryCount !== 0) {
            const last = history[history.length - 1];
            // Extract title from message if possible or just use a generic title
            showModal('提醒', new Date(last.timestamp).toLocaleTimeString());
        }
        lastHistoryCount = history.length;
    }

    init();
    setInterval(checkHistoryForPopup, 5000);

</script>

</body>
</html>
