<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reminder | Console</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --glow: #007AFF; --glow-sec: #5856D6;
            --p-h: #FF3B30; --p-m: #FF9500; --p-l: #34C759;
            --bg: #0A0A0B; --surf: #161618; --border: #242426;
            --text: #F5F5F7; --text-dim: #8E8E93;
        }

        [data-theme="light"] {
            --bg: #F2F2F7; --surf: #FFFFFF; --border: #E5E5EA; --text: #1C1C1E; --text-dim: #8E8E93;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #000; 
            color: var(--text); 
            height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; 
        }

        .phone-shell {
            width: 100vw; max-width: 414px; height: 95vh; max-height: 880px;
            background: var(--bg); position: relative; border-radius: 40px;
            border: 6px solid #222; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        .console-screen { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; }
        .view { display: none; }
        .view.active { display: block; animation: panelIn 0.3s ease-out; }
        @keyframes panelIn { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }

        /* Console Widget Grid */
        .widget-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .widget { 
            background: var(--surf); border: 1px solid var(--border); border-radius: 20px; 
            padding: 16px; position: relative; overflow: hidden;
        }
        .widget.wide { grid-column: span 2; }
        
        .widget-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 700; }
        .widget-val { font-size: 1.4rem; font-weight: 700; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--p-l); display: inline-block; margin-right: 6px; box-shadow: 0 0 10px var(--p-l); }
        
        /* Interactive Cards */
        .task-card {
            background: var(--surf); border: 1px solid var(--border); border-radius: 18px;
            padding: 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px;
            transition: 0.2s; cursor: pointer;
        }
        .task-card:active { transform: scale(0.97); background: var(--border); }
        .p-bar { width: 4px; height: 35px; border-radius: 2px; }
        .task-info { flex: 1; }
        .task-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; }
        .task-meta { font-size: 0.75rem; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }

        /* Cyber Botton Nav */
        .nav-bar {
            height: 80px; background: rgba(22, 22, 24, 0.8); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); display: flex; padding-bottom: 10px;
        }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--text-dim); }
        .nav-btn.active { color: var(--glow); }
        .nav-btn i { font-size: 1.4rem; }
        .nav-btn span { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; }

        .btn-plus {
            width: 50px; height: 50px; background: var(--glow); border-radius: 16px;
            display: flex; align-items: center; justify-content: center; transform: translateY(-10px);
            box-shadow: 0 8px 16px rgba(0, 122, 255, 0.3); color: white; border: none; font-size: 1.2rem;
        }

        /* Terminal Style Logs */
        .term {
            background: #000; border-radius: 12px; padding: 12px; font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem; color: #34C759; border: 1px solid #1a1a1a; max-height: 300px; overflow-y: auto;
        }
        .term-line { margin-bottom: 4px; opacity: 0.8; }
        .term-line span { color: #8E8E93; }

        /* Overlays */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; }
        .sheet {
            position: absolute; bottom: 0; width: 100%; max-width: 414px; left: 50%; transform: translateX(-50%);
            background: var(--surf); border-radius: 30px 30px 0 0; padding: 30px; 
            animation: sheetUp 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        @keyframes sheetUp { from { transform: translate(-50%, 100%); } to { transform: translate(-50%, 0); } }

        .f-label { font-size: 0.7rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .f-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: var(--text); margin-bottom: 18px; outline: none; font-family: inherit; }
        .f-btn { width: 100%; padding: 16px; background: var(--glow); color: white; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }

    </style>
</head>
<body>

<div class="phone-shell">
    <div class="console-screen">
        
        <!-- DASHBOARD VIEW -->
        <div id="viewDash" class="view active">
            <h1 style="margin-bottom: 24px;">CONSOLE</h1>
            
            <div class="widget-grid">
                <div class="widget">
                    <div class="widget-label">System Status</div>
                    <div class="widget-val" style="font-size: 1rem;"><div class="status-dot"></div>ONLINE</div>
                </div>
                <div class="widget">
                    <div class="widget-label">Memory</div>
                    <div class="widget-val">128<span style="font-size:0.8rem; color:var(--text-dim)">MB</span></div>
                </div>
                <div class="widget wide">
                    <div class="widget-label">Next Reminder</div>
                    <div class="widget-val" id="topNextTask" style="font-size: 1.2rem;">Scanning...</div>
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="font-size:0.8rem; color:var(--text-dim); text-transform:uppercase;">Reminders</h3>
                <div style="font-size:0.7rem; color:var(--glow);" id="taskCounter">0 ACTIVE</div>
            </div>
            
            <div id="taskList"></div>
        </div>

        <!-- ANALYTICS VIEW -->
        <div id="viewStats" class="view">
            <h1 style="margin-bottom: 24px;">DATA</h1>
            <div class="widget wide" style="margin-bottom:20px;">
                <canvas id="execChart" height="150"></canvas>
            </div>
            <div id="historyList"></div>
        </div>

        <!-- LOGS VIEW -->
        <div id="viewLogs" class="view">
            <h1 style="margin-bottom: 24px;">TERMINAL</h1>
            <div class="term" id="termOutput"></div>
        </div>

        <!-- SETTINGS VIEW -->
        <div id="viewSet" class="view">
            <h1 style="margin-bottom: 24px;">CONFIG</h1>
            <div class="widget wide" style="margin-bottom:12px; cursor:pointer;" onclick="toggleTheme()">
                <div class="widget-label">Interface Theme</div>
                <div class="widget-val" id="themeVal">DARK MODE</div>
            </div>
            <div class="widget wide" style="margin-bottom:12px; cursor:pointer;" onclick="showSheet('webhook')">
                <div class="widget-label">Notification Channels</div>
                <div class="widget-val">WEBHOOKS</div>
            </div>
            <p style="text-align:center; font-size:0.6rem; color:var(--text-dim); margin-top:20px;">V2.0.0 STABLE • PORT 5000</p>
        </div>

    </div>

    <!-- BOT NAV -->
    <div class="nav-bar">
        <div class="nav-btn active" onclick="nav('Dash', this)"><i class="fas fa-microchip"></i><span>Dash</span></div>
        <div class="nav-btn" onclick="nav('Stats', this)"><i class="fas fa-layer-group"></i><span>Data</span></div>
        <div style="flex:1; display:flex; justify-content:center;"><button class="btn-plus" onclick="showSheet('add')"><i class="fas fa-plus"></i></button></div>
        <div class="nav-btn" onclick="nav('Logs', this)"><i class="fas fa-terminal"></i><span>Logs</span></div>
        <div class="nav-btn" onclick="nav('Set', this)"><i class="fas fa-sliders"></i><span>Config</span></div>
    </div>
</div>

<!-- FORMS -->
<div class="overlay" id="sheetOverlay" onclick="hideSheet()">
    <div class="sheet" id="addSheet" onclick="event.stopPropagation()">
        <div class="f-label">Command Title</div>
        <input type="text" id="t_name" class="f_input" placeholder="Execute Task...">
        <div style="display:flex; gap:12px">
            <div style="flex:1"><div class="f-label">Timestamp</div><input type="time" id="t_time" class="f_input" value="09:00"></div>
            <div style="flex:1">
                <div class="f-label">Priority</div>
                <select id="t_prio" class="f_input">
                    <option value="high">Critical</option>
                    <option value="mid">Standard</option>
                    <option value="low">Low</option>
                </select>
            </div>
        </div>
        <button class="f-btn" onclick="commitTask()">DEPLOY REMINDER</button>
    </div>

    <div class="sheet" id="webhookSheet" onclick="event.stopPropagation()">
        <div class="f-label">Webhook Endpoint</div>
        <input type="text" id="w_url" class="f_input" placeholder="https://...">
        <button class="f-btn" onclick="commitSettings()">SAVE CONFIG</button>
    </div>
</div>

<script>
    let state = null;
    let chart = null;

    async function sync() {
        const res = await fetch('/api/state');
        state = await res.json();
        render();
    }

    function render() {
        // Dash
        const tList = document.getElementById('taskList');
        const pending = state.db.reminders.filter(r => r.status === 'pending').sort((a,b)=>a.time.localeCompare(b.time));
        document.getElementById('taskCounter').innerText = `${pending.length} ACTIVE`;
        document.getElementById('topNextTask').innerText = pending[0] ? pending[0].title : 'ALL CLEAR';
        
        tList.innerHTML = state.db.reminders.map(r => `
            <div class="task-card" style="${r.status==='completed'?'opacity:0.4':''}">
                <div class="p-bar" style="background:var(--p-${r.priority})"></div>
                <div class="task-info">
                    <div class="task-name">${r.title}</div>
                    <div class="task-meta"><i class="far fa-clock"></i>${r.time} • ${r.priority.toUpperCase()}</div>
                </div>
                <div onclick="action('${r.id}', 'toggle')" style="color:var(--glow); cursor:pointer;"><i class="fas fa-check-circle fa-lg"></i></div>
                <div onclick="action('${r.id}', 'delete')" style="color:var(--text-dim); cursor:pointer;"><i class="fas fa-times-circle fa-lg"></i></div>
            </div>
        `).join('');

        // Logs
        const term = document.getElementById('termOutput');
        term.innerHTML = state.syslogs.map(l => `<div class="term-line"><span>[SYS]</span> ${l}</div>`).join('');
        
        // Data
        const hList = document.getElementById('historyList');
        hList.innerHTML = state.logs.slice().reverse().map(l => `
            <div class="task-card" style="margin-bottom:8px; border-style:dashed;">
                <div class="task-info">
                    <div class="task-name" style="font-size:0.85rem">${l.title}</div>
                    <div class="task-meta">${new Date(l.triggered_at).toLocaleString()}</div>
                </div>
            </div>
        `).join('');
        
        updateChart();
    }

    function updateChart() {
        const ctx = document.getElementById('execChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line', data: { labels: ['M','T','W','T','F','S','S'], datasets: [{ data: [5, 8, 3, 10, 6, 12, 7], borderColor:'#007AFF', tension:0.4, fill:true, backgroundColor:'rgba(0,122,255,0.05)', pointRadius:0 }] },
            options: { plugins: { legend: { display:false } }, scales: { x: { grid: { display:false } }, y: { display:false } } }
        });
    }

    async function action(id, type) {
        if(type==='delete' && !confirm('Confirm Purge?')) return;
        await fetch(`/api/reminders/${id}`, {
            method: type==='delete'?'DELETE':'PUT',
            headers:{'Content-Type':'application/json'},
            body: type==='toggle'? JSON.stringify({status:'completed'}):null
        });
        sync();
    }

    async function commitTask() {
        const title = document.getElementById('t_name').value;
        const time = document.getElementById('t_time').value;
        const priority = document.getElementById('t_prio').value;
        if(!title) return;
        await fetch('/api/reminders', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({title, time, priority, repeat:'daily', category:'work'}) });
        hideSheet(); sync();
    }

    function nav(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view'+id).classList.add('active');
        el.classList.add('active');
    }

    function showSheet(id) { document.getElementById('sheetOverlay').style.display='block'; document.getElementById(id+'Sheet').style.display='block'; }
    function hideSheet() { document.getElementById('sheetOverlay').style.display='none'; document.querySelectorAll('.sheet').forEach(s=>s.style.display='none'); }
    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme')==='light'?'dark':'light'); }

    sync(); setInterval(sync, 15000);
</script>

</body>
</html>
