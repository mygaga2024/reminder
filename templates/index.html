<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reminder Service | 控制面板</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(129, 140, 248, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        h1 { font-size: 1.5rem; font-weight: 600; color: var(--accent-primary); }
        h2 { font-size: 1.25rem; font-weight: 400; color: var(--text-dim); }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-dim);
        }

        input, select, textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: white;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        .btn {
            cursor: pointer;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
        }

        .rule-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .rule-item:hover {
            border-color: var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
        }

        .rule-text {
            font-family: monospace;
            font-size: 1rem;
        }

        .btn-delete {
            color: var(--danger);
            background: none;
            font-size: 1.2rem;
            padding: 4px;
        }

        .history-list {
            font-size: 0.875rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--glass-border);
        }

        .history-time { color: var(--accent-primary); font-size: 0.75rem; font-weight: 600; }
        .history-msg { margin-top: 0.25rem; display: block; }

        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .tab { 
            cursor: pointer; 
            padding: 0.5rem 1rem; 
            border-radius: 8px; 
            color: var(--text-dim); 
            font-weight: 600;
        }
        .tab.active { 
            background: rgba(255, 255, 255, 0.1); 
            color: white; 
        }

        @media (max-width: 800px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar: Configuration -->
        <div class="glass-panel">
            <h1>Settings</h1>
            
            <div class="form-group">
                <label>Add New Rule</label>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="newRule" placeholder="e.g. mon-fri 09:30">
                    <button class="btn btn-primary" onclick="addRule()">Add</button>
                </div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 10px; line-height: 1.4;">
                    <strong>支持格式：</strong><br>
                    • 每日: <code>09:00</code> 或 <code>09:00:00</code><br>
                    • 周期: <code>mon-fri 12:00</code><br>
                    • 日期: <code>2026-04-10 18:30:00</code><br>
                    • Cron: <code>0 9 * * *</code> (分 时 日 月 周)
                </div>
            </div>

            <hr style="border: none; border-top: 1px solid var(--glass-border); margin: 2rem 0;">

            <h2>Notifications</h2>
            <div class="form-group">
                <label>Email Notifications</label>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="emailEnabled" style="width: auto;">
                    <span>Enabled</span>
                </div>
            </div>
            <div class="form-group">
                <label>SMTP Server</label>
                <input type="text" id="smtpServer">
            </div>
            <div class="form-group">
                <label>Sender Email</label>
                <input type="email" id="senderEmail">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="smtpPassword">
            </div>
            <div class="form-group">
                <label>Recipient</label>
                <input type="email" id="recipientEmail">
            </div>

            <hr style="border: none; border-top: 1px solid var(--glass-border); margin: 2rem 0;">

            <h2>Webhook</h2>
            <div class="form-group">
                <label>Push Notification Hook</label>
                <input type="text" id="webhookUrl">
            </div>

            <button class="btn btn-primary" style="width: 100%;" onclick="saveSettings()">Save Config</button>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('reminders')">Reminders</div>
                <div class="tab" onclick="switchTab('history')">History</div>
            </div>

            <div id="remindersTab" class="glass-panel">
                <h2>Active Reminders</h2>
                <div id="rulesList">
                    <!-- Rules dynamically loaded here -->
                </div>
            </div>

            <div id="historyTab" class="glass-panel" style="display: none;">
                <h2>History (Last 100)</h2>
                <div class="history-list" id="historyList">
                    <!-- History dynamically loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let config = {};

        async function fetchConfig() {
            const res = await fetch('/api/config');
            config = await res.json();
            renderRules();
            loadSettings();
        }

        async function fetchHistory() {
            const res = await fetch('/api/history');
            const history = await res.json();
            renderHistory(history);
        }

        function renderRules() {
            const list = document.getElementById('rulesList');
            list.innerHTML = '';
            config.reminder_rules.forEach((rule, index) => {
                const item = document.createElement('div');
                item.className = 'rule-item';
                item.innerHTML = `
                    <span class="rule-text">${rule}</span>
                    <button class="btn btn-delete" onclick="deleteRule(${index})">×</button>
                `;
                list.appendChild(item);
            });
        }

        function loadSettings() {
            document.getElementById('emailEnabled').checked = config.email.enabled;
            document.getElementById('smtpServer').value = config.email.smtp_server;
            document.getElementById('senderEmail').value = config.email.sender;
            document.getElementById('smtpPassword').value = config.email.password;
            document.getElementById('recipientEmail').value = config.email.recipient;
            document.getElementById('webhookUrl').value = config.push.webhook_url;
        }

        function addRule() {
            const input = document.getElementById('newRule');
            const val = input.value.trim();
            if (val) {
                config.reminder_rules.push(val);
                input.value = '';
                renderRules();
            }
        }

        function deleteRule(index) {
            config.reminder_rules.splice(index, 1);
            renderRules();
        }

        async function saveSettings() {
            config.email.enabled = document.getElementById('emailEnabled').checked;
            config.email.smtp_server = document.getElementById('smtpServer').value;
            config.email.sender = document.getElementById('senderEmail').value;
            config.email.password = document.getElementById('smtpPassword').value;
            config.email.recipient = document.getElementById('recipientEmail').value;
            config.push.webhook_url = document.getElementById('webhookUrl').value;
            config.push.enabled = !!config.push.webhook_url;

            const res = await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            });
            
            if (res.ok) {
                alert('Success! Configuration saved and reloaded.');
            } else {
                alert('Error saving configuration.');
            }
        }

        function renderHistory(history) {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            history.reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span class="history-time">${new Date(item.timestamp).toLocaleString()}</span>
                    <span class="history-msg">${item.message}</span>
                `;
                list.appendChild(div);
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'reminders') {
                document.getElementById('remindersTab').style.display = 'block';
                document.getElementById('historyTab').style.display = 'none';
            } else {
                document.getElementById('remindersTab').style.display = 'none';
                document.getElementById('historyTab').style.display = 'block';
                fetchHistory();
            }
        }

        // Init
        fetchConfig();
        setInterval(fetchHistory, 10000); // Auto refresh history
    </script>
</body>
</html>
