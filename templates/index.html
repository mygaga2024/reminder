<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reminder | Smart Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --p-h: #FF3B30; --p-m: #FF9500; --p-l: #34C759;
            --primary: #007AFF; --primary-grad: linear-gradient(135deg, #007AFF, #5856D6);
            --bg: #F2F2F7; --surf: #FFFFFF; --text: #000000; --text-sec: #8E8E93;
            --border: rgba(0,0,0,0.05); --round: 24px;
        }

        [data-theme="dark"] {
            --bg: #000000; --surf: #1C1C1E; --text: #FFFFFF; --text-sec: #8E8E93;
            --border: rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #000; 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Standardized Phone Frame */
        .app-shell {
            width: 100vw;
            max-width: 414px;
            height: 94vh;
            max-height: 860px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            border-radius: 48px;
            border: 10px solid #222;
            overflow: hidden;
            z-index: 10;
        }

        .screen { flex: 1; overflow-y: auto; padding: 24px; padding-bottom: 100px; scroll-behavior: smooth; }
        .view { display: none; }
        .view.active { display: block; animation: viewIn 0.5s cubic-bezier(0.19, 1, 0.22, 1); }
        @keyframes viewIn { from { opacity: 0; transform: scale(0.96) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        /* Typography & Components */
        .h-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; background: var(--primary-light); color: var(--primary); }

        /* Dashboard Highlights */
        .hero-card {
            background: var(--primary-grad);
            border-radius: var(--round);
            padding: 24px;
            color: white;
            margin-bottom: 30px;
            box-shadow: 0 15px 30px rgba(0,122,255,0.2);
            position: relative;
            overflow: hidden;
        }
        .hero-card::after { content: ''; position: absolute; right: -20px; top: -20px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; }
        .hero-title { font-size: 0.9rem; opacity: 0.8; margin-bottom: 8px; }
        .hero-main { font-size: 1.6rem; font-weight: 700; margin-bottom: 15px; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; }
        .progress-inner { height: 100%; background: #fff; width: 0%; transition: 1s ease-out; }

        /* Category Filter */
        .cat-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 10px; scrollbar-width: none; }
        .cat-item { 
            padding: 10px 20px; background: var(--surf); border: 1px solid var(--border); border-radius: 100px; 
            font-size: 0.85rem; font-weight: 500; white-space: nowrap; cursor: pointer; transition: 0.2s;
        }
        .cat-item.active { background: var(--text); color: var(--surf); border-color: var(--text); }

        /* Reminder Items - Redesigned */
        .item-group-title { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 12px 5px; }
        .item-card {
            background: var(--surf);
            border-radius: var(--round);
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 15px var(--shadow);
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .item-card:hover { transform: translateY(-2px); border-color: var(--primary); }
        .priority-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .dot-high { background: var(--p-h); box-shadow: 0 0 10px rgba(255,59,48,0.4); }
        .dot-mid { background: var(--p-m); box-shadow: 0 0 10px rgba(255,149,0,0.4); }
        .dot-low { background: var(--p-l); box-shadow: 0 0 10px rgba(52,199,89,0.4); }
        
        .item-content { flex: 1; }
        .item-name { font-weight: 600; font-size: 1.05rem; margin-bottom: 2px; }
        .item-time { font-weight: 500; font-size: 0.85rem; color: var(--primary); }
        
        .btn-action { 
            width: 36px; height: 36px; border-radius: 50%; background: var(--bg); display: flex; 
            align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; color: var(--text-sec);
        }
        .btn-action:hover { background: var(--primary-grad); color: white; }
        .completed .item-name { text-decoration: line-through; opacity: 0.5; }

        /* Bottom Nav - Floating Style */
        .nav-dock {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            height: 70px; background: rgba(var(--surf-rgb), 0.8); backdrop-filter: blur(20px);
            border-radius: 35px; border: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .tab { flex: 1; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--text-sec); cursor: pointer; transition: 0.3s; }
        .tab.active { color: var(--primary); }
        .tab i { font-size: 1.4rem; }
        .tab span { font-size: 0.7rem; font-weight: 600; }
        
        .btn-add-main {
            width: 56px; height: 56px; background: var(--primary-grad); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; transform: translateY(-20px);
            box-shadow: 0 10px 25px rgba(0,122,255,0.4); color: white; font-size: 1.5rem; transition: 0.3s;
        }
        .btn-add-main:hover { transform: translateY(-25px) rotate(90deg); }

        /* Interaction Panel (Action Sheet) */
        .sheet { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; display: none; }
        .sheet-overlay { position: absolute; width:100%; height:100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); }
        .sheet-body { 
            position: absolute; bottom: 0; width: 100%; max-width: 414px; left: 50%; transform: translateX(-50%); 
            background: var(--surf); border-radius: 32px 32px 0 0; padding: 32px; 
            animation: sheetUp 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        @keyframes sheetUp { from { transform: translate(-50%, 100%); } to { transform: translate(-50%, 0); } }
        
        .sheet-handle { width: 40px; height: 5px; background: var(--border); border-radius: 10px; margin: 0 auto 25px; }
        .form-label { font-size: 0.75rem; font-weight: 700; color: var(--text-sec); text-transform: uppercase; margin-bottom: 10px; display: block; }
        .input-pill { width:100%; background: var(--bg); border:none; border-radius: 16px; padding: 18px; font-size: 1rem; color: var(--text); margin-bottom: 24px; outline: none; font-weight: 500; }
        .btn-submit { width:100%; padding:20px; background: var(--primary-grad); color:white; border-radius: 18px; border:none; font-weight:700; font-size:1.1rem; cursor:pointer; }

        /* Stats & Logs */
        .log-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .log-icon { width: 40px; height: 40px; border-radius: 12px; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; }
        .log-info h4 { font-size: 1rem; font-weight: 600; }
        .log-info p { font-size: 0.8rem; color: var(--text-sec); }

        /* Empty State */
        .empty { text-align: center; padding-top: 60px; color: var(--text-sec); }
        .empty i { font-size: 4rem; opacity: 0.1; margin-bottom: 20px; display: block; }

    </style>
</head>
<body data-theme="dark">

<div class="app-shell">
    <!-- Main Screens -->
    <div class="screen">
        
        <!-- Tab 1: Dashboard -->
        <div id="viewFocus" class="view active">
            <header class="h-row">
                <h1 id="greeting">Hello, Gaga</h1>
                <div class="badge" id="dateStr">Apr 10</div>
            </header>

            <div class="hero-card">
                <div class="hero-title">Next Task</div>
                <div class="hero-main" id="nextTask">Review Market Data</div>
                <div class="progress-bar"><div class="progress-inner" id="todayProg"></div></div>
                <div style="font-size: 0.75rem; margin-top: 10px; opacity: 0.8;" id="progText">4 of 5 completed</div>
            </div>

            <div class="cat-scroll">
                <div class="cat-item active" data-cat="all">All Items</div>
                <div class="cat-item" data-cat="work">Work</div>
                <div class="cat-item" data-cat="life">Life</div>
                <div class="cat-item" data-cat="health">Health</div>
                <div class="cat-item" data-cat="finance">Bills</div>
            </div>

            <div id="remindersContainer">
                <!-- Grouped Items -->
            </div>
        </div>

        <!-- Tab 2: Analytics -->
        <div id="viewStats" class="view">
            <h1 style="margin-bottom:20px">Analytics</h1>
            <div style="background:var(--surf); padding:20px; border-radius:var(--round); margin-bottom:25px;">
                <canvas id="mainChart" height="200"></canvas>
            </div>
            <div id="logsContainer">
                <!-- Timeline -->
            </div>
        </div>

        <!-- Tab 3: Settings -->
        <div id="viewConfig" class="view">
            <h1 style="margin-bottom:20px">Settings</h1>
            <div class="item-card" onclick="toggleTheme()">
                <div class="log-icon"><i class="fas fa-moon"></i></div>
                <div class="item-content"><div class="item-name">Dark Mode</div><div class="item-time">Current: On</div></div>
                <i class="fas fa-chevron-right text-sec"></i>
            </div>
            <!-- More settings... -->
        </div>

    </div>

    <!-- Floating Navigation Dock -->
    <div class="nav-dock">
        <div class="tab active" onclick="showView('Focus', this)">
            <i class="fas fa-compass"></i>
            <span>Focus</span>
        </div>
        <div class="btn-add-main" onclick="openSheet()">
            <i class="fas fa-plus"></i>
        </div>
        <div class="tab" onclick="showView('Stats', this)">
            <i class="fas fa-chart-pie"></i>
            <span>Insights</span>
        </div>
    </div>
</div>

<!-- Add Sheet -->
<div class="sheet" id="addSheet">
    <div class="sheet-overlay" onclick="closeSheet()"></div>
    <div class="sheet-body">
        <div class="sheet-handle"></div>
        <h2 style="margin-bottom:30px">New Task</h2>
        
        <label class="form-label">What's on your mind?</label>
        <input type="text" id="f_title" class="input-pill" placeholder="e.g. Gym Session">
        
        <div style="display:flex; gap:15px; margin-bottom:24px;">
            <div style="flex:1">
                <label class="form-label">Trigger Time</label>
                <input type="time" id="f_time" class="input-pill" style="margin-bottom:0">
            </div>
            <div style="flex:1">
                <label class="form-label">Priority</label>
                <select id="f_priority" class="input-pill" style="margin-bottom:0">
                    <option value="low">Low</option>
                    <option value="mid">Medium</option>
                    <option value="high">Urgent</option>
                </select>
            </div>
        </div>

        <label class="form-label">Category</label>
        <div class="cat-scroll" id="f_cat_picker">
            <div class="cat-item active" data-val="work">Work</div>
            <div class="cat-item" data-val="life">Life</div>
            <div class="cat-item" data-val="health">Health</div>
            <div class="cat-item" data-val="finance">Bills</div>
        </div>

        <button class="btn-submit" onclick="submitReminder()">Add Task</button>
    </div>
</div>

<script>
    let state = { db: { reminders: [], settings: {} }, logs: [] };
    let chart = null;

    async function sync() {
        const res = await fetch('/api/state');
        state = await res.json();
        
        // Update UI
        renderReminders();
        renderStats();
        updateSummary();
        
        // Handlers for dynamic UI
        document.getElementById('dateStr').textContent = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const hr = new Date().getHours();
        document.getElementById('greeting').textContent = hr < 12 ? 'Good Morning' : hr < 18 ? 'Good Afternoon' : 'Good Evening';
    }

    function renderReminders() {
        const container = document.getElementById('remindersContainer');
        const items = state.db.reminders;
        
        if (items.length === 0) {
            container.innerHTML = `<div class="empty"><i class="fas fa-peace"></i>Everything is clear today</div>`;
            return;
        }

        // Group by priority for focus
        const groups = { high: [], mid: [], low: [] };
        items.filter(r => r.status === 'pending').forEach(r => groups[r.priority || 'low'].push(r));

        let html = '';
        ['high', 'mid', 'low'].forEach(p => {
            if (groups[p].length > 0) {
                html += `<div class="item-group-title">${p} priority</div>`;
                groups[p].forEach(r => {
                    html += `
                        <div class="item-card">
                            <div class="priority-dot dot-${r.priority}"></div>
                            <div class="item-content">
                                <div class="item-name">${r.title}</div>
                                <div class="item-time"><i class="far fa-clock"></i> ${r.time}</div>
                            </div>
                            <div class="btn-action" onclick="markDone('${r.id}')"><i class="fas fa-check"></i></div>
                            <div class="btn-action" onclick="deleteTask('${r.id}')"><i class="fas fa-trash-alt"></i></div>
                        </div>
                    `;
                });
            }
        });
        container.innerHTML = html;
    }

    function renderStats() {
        const logC = document.getElementById('logsContainer');
        logC.innerHTML = state.logs.slice().reverse().map(l => `
            <div class="log-item">
                <div class="log-icon"><i class="fas fa-check"></i></div>
                <div class="log-info">
                    <h4>${l.title}</h4>
                    <p>${new Date(l.triggered_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} • ${l.status}</p>
                </div>
            </div>
        `).join('');

        if (state.logs.length > 0) updateChart();
    }

    function updateSummary() {
        const pending = state.db.reminders.filter(r => r.status === 'pending');
        const completed = state.db.reminders.filter(r => r.status === 'completed');
        const total = pending.length + completed.length;
        
        const prog = total > 0 ? (completed.length / total) * 100 : 0;
        document.getElementById('todayProg').style.width = prog + '%';
        document.getElementById('progText').textContent = `${completed.length} of ${total} tasks completed`;
        
        if (pending.length > 0) {
            // Find earliest next task
            const next = pending.sort((a,b) => a.time.localeCompare(b.time))[0];
            document.getElementById('nextTask').textContent = next.title;
        } else {
            document.getElementById('nextTask').textContent = 'Well Done!';
        }
    }

    async function submitReminder() {
        const task = {
            title: document.getElementById('f_title').value,
            time: document.getElementById('f_time').value,
            priority: document.getElementById('f_priority').value,
            category: document.querySelector('#f_cat_picker .active').dataset.val,
            repeat: 'daily'
        };
        if (!task.title || !task.time) return alert('Details needed!');
        
        await fetch('/api/reminders', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(task)
        });
        closeSheet();
        sync();
    }

    async function markDone(id) {
        await fetch(`/api/reminders/${id}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ status: 'completed' })
        });
        sync();
    }

    async function deleteTask(id) {
        if (!confirm('Discard this task?')) return;
        await fetch(`/api/reminders/${id}`, { method: 'DELETE' });
        sync();
    }

    function updateChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    data: [12, 19, 13, 15, 22, 13, 15],
                    borderColor: '#007AFF',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(0,122,255,0.1)'
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { x: { grid: { display: false } }, y: { display: false } }
            }
        });
    }

    function showView(name, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('view' + name).classList.add('active');
        el.classList.add('active');
    }

    function openSheet() { document.getElementById('addSheet').style.display = 'block'; }
    function closeSheet() { document.getElementById('addSheet').style.display = 'none'; }
    
    function toggleTheme() {
        const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', t);
    }

    // Init Logic
    sync();
    setInterval(sync, 10000);

    // Dynamic Category Selection
    document.querySelectorAll('#f_cat_picker .cat-item').forEach(i => {
        i.onclick = () => {
            i.parentElement.querySelectorAll('.cat-item').forEach(x => x.classList.remove('active'));
            i.classList.add('active');
        };
    });
</script>

</body>
</html>
