services:
  reminder:
    build: .
    image: ghcr.io/mygaga2024/reminder:latest
    container_name: reminder
    restart: always
    ports:
      - "35015:5000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - PUID=1000
      - PGID=1000
      - APP_PORT=5000
