services:
  reminder:
    build: .
    image: ghcr.io/mygaga2024/reminder:latest
    container_name: life-reminder
    restart: unless-stopped
    ports:
      - "35015:5000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - PUID=0
      - PGID=0
      - UMASK=000
      - APP_PORT=5000
      - DATA_DIR=/app/data
      # 极空间(ZSpace)用户请取消下面注释
      # - ZSPACE_COMPAT=true
      # API Key 认证（可选）
      # - API_KEY=your-secret-key-here
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
